title: Grepmam Blog
description: "Un navegante en el ciberespacio"
author:
  name:
  email:
  url: "https://github.com/grepmam"

baseurl: /

source: .
destination: ./_site
permalink: /:title
paginate: 3
paginate_path: /page/:num/

defaults:
  -
    scope:
      path: ""
      type: "posts"
    values:
      layout: "post"

future: true
plugins:
  - jekyll-seo-tag
  - jekyll-paginate
  - jekyll-sitemap

# Custom variables
owner : "grepmam"
year : "2023"
